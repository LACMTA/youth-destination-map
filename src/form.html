---
layout: default
title: "Youth Destination Map"
css: 
  - '/css/form.css'
js-footer:
  - '/js/form.js'
---

<div id="wrapper">

  <!--<div id="map-container"></div>-->

  <div id="form-container">
    <h1>Metro Youth Destination Guide</h1>
    <form id="form" autocomplete="off">
      <label for="first-name">What's your first name?</label><br>
      <input type="text" name="first-name" id="first-name" required /><br>
      
      <label for="destination">What place would you recommend to a friend?</label><br>
      <div id="google-autocomplete"></div>


      <label for="description">Why would they like going there?</label><br>
      <textarea name="description" id="description" required maxlength="300"></textarea><br>

      <label for="category">What type of place is it?</label><br>
      <select name="category" id="category" required>
        <option value="">Select a category</option>
        <option value="Attractions - Hotels, Resorts, Theme Parks">Attractions - Hotels, Resorts, Theme Parks</option>
        <option value="Civic - Libraries, Parks, Beaches, Government">Civic - Libraries, Parks, Beaches, Government</option>
        <option value="Entertainment - Sports, Museums, Theater, Movies">Entertainment - Sports, Museums, Theater, Movies</option>
        <option value="Food + Drink">Food + Drink</option>
        <option value="Music Shops and Venues">Music Shops and Venues</option>
        <option value="Neighborhoods, Shopping Districts, Shopping">Neighborhoods, Shopping Districts, Shopping</option>
        <option value="School/College/University">School/College/University</option>
        <option value="Self-Care - Gyms, Health, Beauty">Self-Care - Gyms, Health, Beauty</option>
        <option value="Transit-related">Transit-related</option>
      </select><br>
      <button type="submit" id="form-submit" >Submit</button>
    </form>
    <div id="confirmation"></div>
    <div id="saving">saving 
      <span class="dot-one"> .</span>
      <span class="dot-two"> .</span>
      <span class="dot-three"> .</span>
    </div>

    <!-- <div>
      <br><br>
      <a href="{{ '/' | url }}">View the map</a>
    </div> -->
  </div>
</div>
